<article class="movie-card" [class.has-image]="movie.image" role="article" [attr.aria-label]="movie.title">
  <div (click)="onMovieClick()" class="movie-card__poster">
    @if (movie.image) {
      <img
        [src]="'http://localhost:8080/movies/' + movie.id + '/image'"
        [alt]="movie.title + ' poster'"
        class="movie-card__img"
      />
    } @else {
      <div class="movie-card__no-poster" aria-hidden="true">
        <span class="movie-card__no-poster-icon">🎬</span>
      </div>
    }
    <div class="movie-card__overlay" aria-hidden="true"></div>
    <div class="movie-card__rating" [attr.aria-label]="'Note: ' + movie.rate + ' sur 10'">
      <span class="movie-card__rating-star">★</span>
      <span class="movie-card__rating-value">{{ movie.rate }}</span>
    </div>
  </div>

  <div class="movie-card__body">
    <h2 class="movie-card__title">{{ movie.title }}</h2>
    <div class="movie-card__divider" aria-hidden="true"></div>
    <p class="movie-card__synopsis">{{ movie.synopsis }}</p>
  </div>
</article>
