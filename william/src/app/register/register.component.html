<div class="register-page">
  <div class="register-card">
    <h1 class="register-card__title">Passionné(e) de cinéma ? Inscris toi !</h1>
    <p class="register-card__subtitle">Et rejoins une vraie communauté</p>

    <form class="register-card__form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="register-card__field">
        <label for="first-name">Prénom</label>
        <input id="first-name" type="text" formControlName="firstName"/>
      </div>

      <div class="register-card__field">
        <label for="last-name">Nom</label>
        <input id="last-name" type="text" formControlName="lastName"/>
      </div>

      <div class="register-card__field">
        <label for="age">Âge</label>
        <input id="age" type="number" formControlName="age"/>
      </div>

      <div class="register-card__field">
        <label for="email">Email</label>
        <input id="email" type="text" formControlName="email"/>
      </div>

      <button class="register-card__submit" type="submit" [disabled]="!registerForm.valid">
        S'inscrire
      </button>
    </form>

    <div class="register-card__divider">Déjà un compte ?</div>
    <button class="register-card__secondary" (click)="showLoginPage()">Se connecter</button>
  </div>
</div>
